<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Luca Apuesta PRO</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<h1>💰 Luca Apuesta PRO</h1>

<h2>Saldo: $<span id="saldo">0</span></h2>

<input type="number" id="monto" placeholder="Monto de apuesta">

<h2>⚽ Partidos disponibles</h2>

<div>
  <p>Barcelona vs Real Madrid (Cuota 2.0)</p>
  <button onclick="apostarPartido('Barcelona vs Real Madrid', 2.0)">Apostar</button>
</div>

<div>
  <p>Manchester City vs Liverpool (Cuota 1.8)</p>
  <button onclick="apostarPartido('Manchester City vs Liverpool', 1.8)">Apostar</button>
</div>

<h2>📊 Historial (Tiempo Real)</h2>
<ul id="historial"></ul>

<script>
// 🔥 CONFIG FIREBASE
var firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "luca-apuesta.firebaseapp.com",
  projectId: "luca-apuesta",
  storageBucket: "luca-apuesta.firebasestorage.app",
  messagingSenderId: "231008720094",
  appId: "1:231008720094:web:69dd7c6c1e0375a1fc1e4f"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// 📌 REFERENCIA USUARIO (simple por ahora)
var userId = "usuario_demo";

// 📊 REFERENCIAS
var saldoRef = db.collection("usuarios").doc(userId);
var apuestasRef = db.collection("apuestas");

// 🟢 CREAR USUARIO SI NO EXISTE
saldoRef.get().then(function(doc) {
  if (!doc.exists) {
    saldoRef.set({ saldo: 1000 });
  }
});

// 🔄 ESCUCHAR SALDO EN TIEMPO REAL
saldoRef.onSnapshot(function(doc) {
  if (doc.exists) {
    document.getElementById("saldo").innerText = doc.data().saldo.toFixed(2);
  }
});

// 🔄 ESCUCHAR HISTORIAL EN TIEMPO REAL
apuestasRef
  .where("userId", "==", userId)
  .orderBy("timestamp", "desc")
  .onSnapshot(function(snapshot) {

    var lista = document.getElementById("historial");
    lista.innerHTML = "";

    snapshot.forEach(function(doc) {
      var a = doc.data();

      var item = document.createElement("li");
      item.textContent =
        (a.partido || "Sin nombre") +
        " - $" + (a.monto || 0) +
        " - " + (a.fecha || "");

      lista.appendChild(item);
    });
  });

// ⚽ APOSTAR (TRANSACCIÓN REAL)
function apostarPartido(partido, cuota) {
  var monto = parseFloat(document.getElementById("monto").value);

  if (!monto || monto <= 0) {
    alert("Ingresa un monto válido");
    return;
  }

  db.runTransaction(function(transaction) {
    return transaction.get(saldoRef).then(function(doc) {

      var saldoActual = doc.data().saldo;

      if (monto > saldoActual) {
        throw "Saldo insuficiente";
      }

      var nuevoSaldo = saldoActual - monto;

      // 🔽 Actualizar saldo
      transaction.update(saldoRef, { saldo: nuevoSaldo });

      // 🔽 Guardar apuesta
      var nuevaApuestaRef = apuestasRef.doc();

      transaction.set(nuevaApuestaRef, {
        userId: userId,
        partido: partido || "Partido desconocido",
        cuota: cuota,
        monto: monto,
        posible_ganancia: monto * cuota,
        estado: "pendiente",
        fecha: new Date().toLocaleString(),
        timestamp: new Date()
      });

    });
  })
  .then(function() {
    console.log("Apuesta realizada 🔥");
  })
  .catch(function(error) {
    alert(error);
  });
}

</script>

</body>
</html>
