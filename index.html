<!DOCTYPE html>
<html>
<head>
  <title>LUCA APUESTA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0a0a0a, #001f1f);
      color: white;
    }

    h1 {
      text-align: center;
      color: #00ffcc;
      margin-top: 10px;
    }

    .container {
      padding: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 10px rgba(0,255,204,0.2);
    }

    .saldo {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      background: #00ffcc;
      color: black;
      padding: 10px;
      border-radius: 10px;
    }

    .stats {
      font-size: 13px;
      text-align: center;
      margin-bottom: 10px;
      color: #00ffcc;
    }

    .match h3 {
      margin: 0;
    }

    .ia {
      font-size: 13px;
      margin: 5px 0;
      color: #00ffcc;
    }

    input {
      padding: 10px;
      width: 100%;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
    }

    button {
      flex: 1;
      margin: 3px;
      padding: 10px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.2s;
    }

    button:active {
      transform: scale(0.95);
    }

    .btn-apostar {
      background: #00ffcc;
      color: black;
    }

    .ganar {
      background: green;
      color: white;
    }

    .perder {
      background: red;
      color: white;
    }

    h2 {
      margin-top: 20px;
      color: #00ffcc;
    }
  </style>
</head>

<body>

<h1>⚽ LUCA APUESTA</h1>

<div class="container">

  <div class="stats" id="stats"></div>
  <div class="saldo" id="saldo"></div>

  <h2>Partidos</h2>
  <div id="matches"></div>

  <h2>Mis Apuestas</h2>
  <div id="bets"></div>

</div>

<script>
const partidos = [
  { equipos: "Real Madrid vs Barcelona", cuotas: [1.8, 3.5, 2.1] },
  { equipos: "Manchester City vs Arsenal", cuotas: [1.6, 3.8, 2.5] },
  { equipos: "PSG vs Bayern", cuotas: [2.0, 3.2, 1.9] }
];

let saldoGuardado = localStorage.getItem("saldo");
let saldo = saldoGuardado !== null ? parseFloat(saldoGuardado) : 1000;

let apuestas = JSON.parse(localStorage.getItem("apuestas")) || [];

const matchesDiv = document.getElementById("matches");
const betsDiv = document.getElementById("bets");
const saldoDiv = document.getElementById("saldo");

// IA
function calcularProbabilidad(cuota) {
  let probBase = 100 / cuota;
  let forma = Math.random() * 20 - 10;
  let sorpresa = Math.random() * 10 - 5;

  let probFinal = probBase + forma + sorpresa;

  if (probFinal > 95) probFinal = 95;
  if (probFinal < 5) probFinal = 5;

  return probFinal.toFixed(1);
}

function getRecomendacion(prob) {
  if (prob >= 70) return "🔥 Apuesta fuerte";
  if (prob >= 60) return "⚠️ Riesgo medio";
  return "❌ Evitar";
}

// STATS
function calcularStats() {
  let totalApostado = 0;
  let totalGanado = 0;
  let ganadas = 0;
  let perdidas = 0;

  apuestas.forEach(a => {
    totalApostado += a.monto;

    if (a.estado === "ganada") {
      totalGanado += parseFloat(a.ganancia);
      ganadas++;
    } else if (a.estado === "perdida") {
      perdidas++;
    }
  });

  const totalJugadas = ganadas + perdidas;
  const winrate = totalJugadas > 0 
    ? ((ganadas / totalJugadas) * 100).toFixed(1) 
    : 0;

  const profit = (totalGanado - totalApostado).toFixed(2);

  document.getElementById("stats").innerHTML = `
    Apostado: $${totalApostado} | Ganado: $${totalGanado} | Profit: $${profit} | Winrate: ${winrate}%
  `;
}

function actualizarSaldo() {
  saldoDiv.innerHTML = `Saldo: $${saldo}`;
}

// PARTIDOS
function renderPartidos() {
  matchesDiv.innerHTML = "";

  partidos.forEach((p) => {
    const prob = calcularProbabilidad(p.cuotas[0]);
    const recomendacion = getRecomendacion(prob);

    const div = document.createElement("div");
    div.className = "card match";

    div.innerHTML = `
      <h3>${p.equipos}</h3>
      <p class="ia">${prob}% | ${recomendacion}</p>

      <input type="number" id="monto-${p.equipos}" placeholder="Monto $" />

      <div class="buttons">
        <button class="btn-apostar" onclick="apostar('${p.equipos}', 'Local', ${p.cuotas[0]})">L</button>
        <button class="btn-apostar" onclick="apostar('${p.equipos}', 'Empate', ${p.cuotas[1]})">E</button>
        <button class="btn-apostar" onclick="apostar('${p.equipos}', 'Visitante', ${p.cuotas[2]})">V</button>
      </div>
    `;

    matchesDiv.appendChild(div);
  });
}

// APOSTAR
function apostar(partido, tipo, cuota) {
  const montoInput = document.getElementById(`monto-${partido}`);
  const monto = parseFloat(montoInput.value);

  if (!monto || monto <= 0) return alert("Monto inválido");
  if (monto > saldo) return alert("Saldo insuficiente");

  saldo -= monto;
  localStorage.setItem("saldo", saldo);

  const ganancia = (monto * cuota).toFixed(2);

  apuestas.push({ partido, tipo, cuota, monto, ganancia, estado: "pendiente" });
  localStorage.setItem("apuestas", JSON.stringify(apuestas));

  actualizarSaldo();
  renderApuestas();
  calcularStats();

  montoInput.value = "";
}

// RESOLVER
function resolverApuesta(index, resultado) {
  const apuesta = apuestas[index];

  if (apuesta.estado !== "pendiente") return;

  if (resultado === "ganada") {
    saldo += parseFloat(apuesta.ganancia);
    apuesta.estado = "ganada";
  } else {
    apuesta.estado = "perdida";
  }

  localStorage.setItem("saldo", saldo);
  localStorage.setItem("apuestas", JSON.stringify(apuestas));

  actualizarSaldo();
  renderApuestas();
  calcularStats();
}

// APUESTAS
function renderApuestas() {
  betsDiv.innerHTML = "";

  apuestas.forEach((a, i) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${a.partido}</strong><br>
      ${a.tipo} | Cuota ${a.cuota}<br>
      $${a.monto} → $${a.ganancia}<br>
      Estado: ${a.estado}<br>

      ${
        a.estado === "pendiente"
          ? `
        <button class="ganar" onclick="resolverApuesta(${i}, 'ganada')">✔</button>
        <button class="perder" onclick="resolverApuesta(${i}, 'perdida')">✖</button>
      `
          : ""
      }
    `;

    betsDiv.appendChild(div);
  });
}

// INIT
actualizarSaldo();
renderPartidos();
renderApuestas();
calcularStats();
</script>

</body>
</html>
