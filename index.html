<!DOCTYPE html>
<html>
<head>
  <title>LUCA APUESTA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #00ffcc;
    }
    .match, .bet {
      background: #1a1a1a;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
    }
    input {
      padding: 10px;
      width: 100px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>LUCA APUESTA ⚽</h1>

<h2>Partidos</h2>
<div id="matches"></div>

<h2>Mis Apuestas</h2>
<div id="bets"></div>

<script>
const partidos = [
  { equipos: "Real Madrid vs Barcelona", cuotas: [1.8, 3.5, 2.1] },
  { equipos: "Manchester City vs Arsenal", cuotas: [1.6, 3.8, 2.5] },
  { equipos: "PSG vs Bayern", cuotas: [2.0, 3.2, 1.9] }
];

let apuestas = JSON.parse(localStorage.getItem("apuestas")) || [];

const matchesDiv = document.getElementById("matches");
const betsDiv = document.getElementById("bets");

function renderPartidos() {
  matchesDiv.innerHTML = "";

  partidos.forEach((p) => {
    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <h3>${p.equipos}</h3>
      <input type="number" id="monto-${p.equipos}" placeholder="Monto $" />
      <br>
      <button onclick="apostar('${p.equipos}', 'Local', ${p.cuotas[0]})">Local (${p.cuotas[0]})</button>
      <button onclick="apostar('${p.equipos}', 'Empate', ${p.cuotas[1]})">Empate (${p.cuotas[1]})</button>
      <button onclick="apostar('${p.equipos}', 'Visitante', ${p.cuotas[2]})">Visitante (${p.cuotas[2]})</button>
    `;

    matchesDiv.appendChild(div);
  });
}

function apostar(partido, tipo, cuota) {
  const montoInput = document.getElementById(`monto-${partido}`);
  const monto = parseFloat(montoInput.value);

  if (!monto || monto <= 0) {
    alert("Ingresa un monto válido");
    return;
  }

  const ganancia = (monto * cuota).toFixed(2);

  const apuesta = {
    partido,
    tipo,
    cuota,
    monto,
    ganancia
  };

  apuestas.push(apuesta);
  localStorage.setItem("apuestas", JSON.stringify(apuestas));

  renderApuestas();
  montoInput.value = "";
}

function renderApuestas() {
  betsDiv.innerHTML = "";

  apuestas.forEach((a) => {
    const div = document.createElement("div");
    div.className = "bet";

    div.innerHTML = `
      <p><strong>${a.partido}</strong></p>
      <p>${a.tipo} | Cuota: ${a.cuota}</p>
      <p>Monto: $${a.monto}</p>
      <p>Ganancia potencial: $${a.ganancia}</p>
    `;

    betsDiv.appendChild(div);
  });
}

renderPartidos();
renderApuestas();
</script>

</body>
</html>
