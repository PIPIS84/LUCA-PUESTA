<!DOCTYPE html>
<html>
<head>
  <title>LUCA APUESTA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #00ffcc;
    }
    .match {
      background: #1a1a1a;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      background: #00ffcc;
      color: black;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>LUCA APUESTA ⚽</h1>

<div id="matches"></div>

<script>
const partidos = [
  { equipos: "Real Madrid vs Barcelona", cuotas: [1.8, 3.5, 2.1] },
  { equipos: "Manchester City vs Arsenal", cuotas: [1.6, 3.8, 2.5] },
  { equipos: "PSG vs Bayern", cuotas: [2.0, 3.2, 1.9] }
];

const container = document.getElementById("matches");

partidos.forEach((p) => {
  const div = document.createElement("div");
  div.className = "match";

  div.innerHTML = `
    <h3>${p.equipos}</h3>
    <button onclick="apostar('${p.equipos}', 'Local', ${p.cuotas[0]})">
      Local (${p.cuotas[0]})
    </button>
    <button onclick="apostar('${p.equipos}', 'Empate', ${p.cuotas[1]})">
      Empate (${p.cuotas[1]})
    </button>
    <button onclick="apostar('${p.equipos}', 'Visitante', ${p.cuotas[2]})">
      Visitante (${p.cuotas[2]})
    </button>
  `;

  container.appendChild(div);
});

function apostar(partido, tipo, cuota) {
  alert(`Apostaste en ${partido} → ${tipo} (Cuota ${cuota})`);
}
</script>

</body>
</html>
