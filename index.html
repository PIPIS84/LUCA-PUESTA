<!DOCTYPE html>
<html>
<head>
  <title>LUCA APUESTA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      background: #0a0a0a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #00ffcc;
    }
    .saldo {
      background: #00ffcc;
      color: black;
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .match, .bet {
      background: #1a1a1a;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
    }
    .btn-apostar {
      background: #00ffcc;
      color: black;
    }
    .ganar {
      background: green;
      color: white;
    }
    .perder {
      background: red;
      color: white;
    }
    input {
      padding: 10px;
      width: 100px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
    }
    .ia {
      margin-top: 10px;
      font-size: 14px;
      color: #00ffcc;
    }
  </style>
</head>
<body>

<h1>LUCA APUESTA ⚽</h1>

<div class="saldo" id="saldo"></div>

<h2>Partidos</h2>
<div id="matches"></div>

<h2>Mis Apuestas</h2>
<div id="bets"></div>

<script>
const partidos = [
  { equipos: "Real Madrid vs Barcelona", cuotas: [1.8, 3.5, 2.1], prob: 72 },
  { equipos: "Manchester City vs Arsenal", cuotas: [1.6, 3.8, 2.5], prob: 65 },
  { equipos: "PSG vs Bayern", cuotas: [2.0, 3.2, 1.9], prob: 55 }
];

// SALDO
let saldo = parseFloat(localStorage.getItem("saldo")) || 1000;
let apuestas = JSON.parse(localStorage.getItem("apuestas")) || [];

const matchesDiv = document.getElementById("matches");
const betsDiv = document.getElementById("bets");
const saldoDiv = document.getElementById("saldo");

function actualizarSaldo() {
  saldoDiv.innerHTML = `Saldo: $${saldo}`;
}

function getRecomendacion(prob) {
  if (prob >= 70) return "🔥 Apuesta fuerte";
  if (prob >= 60) return "⚠️ Riesgo medio";
  return "❌ Evitar";
}

function renderPartidos() {
  matchesDiv.innerHTML = "";

  partidos.forEach((p) => {
    const recomendacion = getRecomendacion(p.prob);

    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <h3>${p.equipos}</h3>
      <p class="ia">Probabilidad: ${p.prob}% | ${recomendacion}</p>

      <input type="number" id="monto-${p.equipos}" placeholder="Monto $" />
      <br>

      <button class="btn-apostar" onclick="apostar('${p.equipos}', 'Local', ${p.cuotas[0]})">Local (${p.cuotas[0]})</button>
      <button class="btn-apostar" onclick="apostar('${p.equipos}', 'Empate', ${p.cuotas[1]})">Empate (${p.cuotas[1]})</button>
      <button class="btn-apostar" onclick="apostar('${p.equipos}', 'Visitante', ${p.cuotas[2]})">Visitante (${p.cuotas[2]})</button>
    `;

    matchesDiv.appendChild(div);
  });
}

function apostar(partido, tipo, cuota) {
  const montoInput = document.getElementById(`monto-${partido}`);
  const monto = parseFloat(montoInput.value);

  if (!monto || monto <= 0) {
    alert("Ingresa un monto válido");
    return;
  }

  if (monto > saldo) {
    alert("Saldo insuficiente");
    return;
  }

  saldo -= monto;
  localStorage.setItem("saldo", saldo);

  const ganancia = (monto * cuota).toFixed(2);

  const apuesta = {
    partido,
    tipo,
    cuota,
    monto,
    ganancia,
    estado: "pendiente"
  };

  apuestas.push(apuesta);
  localStorage.setItem("apuestas", JSON.stringify(apuestas));

  actualizarSaldo();
  renderApuestas();
  montoInput.value = "";
}

function resolverApuesta(index, resultado) {
  const apuesta = apuestas[index];

  if (apuesta.estado !== "pendiente") return;

  if (resultado === "ganada") {
    saldo += parseFloat(apuesta.ganancia);
    apuesta.estado = "ganada";
  } else {
    apuesta.estado = "perdida";
  }

  localStorage.setItem("saldo", saldo);
  localStorage.setItem("apuestas", JSON.stringify(apuestas));

  actualizarSaldo();
  renderApuestas();
}

function renderApuestas() {
  betsDiv.innerHTML = "";

  apuestas.forEach((a, i) => {
    const div = document.createElement("div");
    div.className = "bet";

    div.innerHTML = `
      <p><strong>${a.partido}</strong></p>
      <p>${a.tipo} | Cuota: ${a.cuota}</p>
      <p>Monto: $${a.monto}</p>
      <p>Ganancia: $${a.ganancia}</p>
      <p>Estado: ${a.estado}</p>

      ${
        a.estado === "pendiente"
          ? `
        <button class="ganar" onclick="resolverApuesta(${i}, 'ganada')">Gané</button>
        <button class="perder" onclick="resolverApuesta(${i}, 'perdida')">Perdí</button>
      `
          : ""
      }
    `;

    betsDiv.appendChild(div);
  });
}

// INIT
actualizarSaldo();
renderPartidos();
renderApuestas();
</script>

</body>
</html>
