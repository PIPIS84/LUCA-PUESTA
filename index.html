<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Luca Apuesta</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

<h1>💰 Luca Apuesta</h1>

<h2>Saldo: $<span id="saldo">0</span></h2>

<input type="number" id="monto" placeholder="Monto de apuesta">

<br><br>
<button onclick="limpiarHistorial()">🧹 Limpiar historial (corregir errores viejos)</button>

<h2>⚽ Partidos disponibles</h2>

<div>
  <p>Barcelona vs Real Madrid (Cuota 2.0)</p>
  <button onclick="apostarPartido('Barcelona vs Real Madrid', 2.0)">Apostar</button>
</div>

<div>
  <p>Manchester City vs Liverpool (Cuota 1.8)</p>
  <button onclick="apostarPartido('Manchester City vs Liverpool', 1.8)">Apostar</button>
</div>

<h2>📊 Historial</h2>
<ul id="historial"></ul>

<script>
// 🔥 CONFIG FIREBASE
var firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "luca-apuesta.firebaseapp.com",
  projectId: "luca-apuesta",
  storageBucket: "luca-apuesta.firebasestorage.app",
  messagingSenderId: "231008720094",
  appId: "1:231008720094:web:69dd7c6c1e0375a1fc1e4f"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// 💰 SALDO
var saldo = localStorage.getItem("saldo")
  ? parseFloat(localStorage.getItem("saldo"))
  : 1000;

document.getElementById("saldo").innerText = saldo.toFixed(2);

// ⚽ APOSTAR
function apostarPartido(partido, cuota) {
  var monto = parseFloat(document.getElementById("monto").value);

  if (!monto || monto <= 0) {
    alert("Ingresa un monto válido");
    return;
  }

  if (monto > saldo) {
    alert("Saldo insuficiente");
    return;
  }

  saldo -= monto;

  localStorage.setItem("saldo", saldo);
  document.getElementById("saldo").innerText = saldo.toFixed(2);

  // 📊 Historial seguro
  var historial = JSON.parse(localStorage.getItem("historial")) || [];

  historial.push({
    partido: partido || "Partido desconocido",
    monto: monto || 0,
    fecha: new Date().toLocaleString()
  });

  localStorage.setItem("historial", JSON.stringify(historial));
  mostrarHistorial();

  // 🔥 Firebase
  db.collection("apuestas").add({
    partido: partido || "Partido desconocido",
    cuota: cuota,
    monto: monto || 0,
    posible_ganancia: (monto || 0) * cuota,
    estado: "pendiente",
    fecha: new Date().toLocaleString()
  })
  .then(function() {
    console.log("Guardado 🔥");
  })
  .catch(function(error) {
    console.error("Error:", error);
  });
}

// 📊 MOSTRAR HISTORIAL (mejorado)
function mostrarHistorial() {
  var historial = JSON.parse(localStorage.getItem("historial")) || [];
  var lista = document.getElementById("historial");

  lista.innerHTML = "";

  historial.forEach(function(apuesta) {
    var item = document.createElement("li");

    item.textContent =
      (apuesta.partido || "Sin nombre") +
      " - $" + (apuesta.monto || 0) +
      " - " + (apuesta.fecha || "");

    lista.appendChild(item);
  });
}

// 🧹 LIMPIAR HISTORIAL (para quitar "undefined")
function limpiarHistorial() {
  if (confirm("Esto borrará apuestas con errores. ¿Continuar?")) {
    localStorage.removeItem("historial");
    mostrarHistorial();
  }
}

// Cargar historial al inicio
mostrarHistorial();

</script>

</body>
</html>
